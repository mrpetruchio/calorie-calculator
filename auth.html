<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NutriWorld — вход</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header class="hero small-hero">
  <nav class="nav container">
    <a href="index.html" class="logo">
      <span class="logo-mark">NW</span>
      NutriWorld
    </a>

    <div class="nav-actions">
      <a href="index.html" class="nav-link">Калькулятор</a>
      <a href="foods.html" class="nav-link">Блюда</a>
      <a href="diary.html" class="nav-link">Дневник</a>
      <a href="auth.html" id="accountLink" class="nav-link active">Вход</a>
      <select id="languageSelect" class="language-select"></select>
    </div>
  </nav>

  <div class="container hero-content">
    <div class="badge">Аккаунт</div>
    <h1>Вход в NutriWorld</h1>
    <p>Создайте аккаунт, чтобы позже сохранять дневник питания в облаке.</p>
  </div>
</header>

<main class="container">

  <section class="card">
    <div class="section-title">
      <h2>Войти или зарегистрироваться</h2>
      <p>Введите email и пароль. Если аккаунта нет — нажмите “Зарегистрироваться”.</p>
    </div>

    <form id="authForm" class="form">
      <label>
        Email
        <input type="email" id="authEmail" placeholder="you@example.com" required />
      </label>

      <label>
        Пароль
        <input type="password" id="authPassword" placeholder="Минимум 6 символов" required />
      </label>

      <button type="button" id="loginBtn">Войти</button>
      <button type="button" id="signupBtn" class="secondary-button">Зарегистрироваться</button>
    </form>

    <div id="authStatus" class="result hidden"></div>

    <button id="logoutBtn" class="danger-button hidden">
      Выйти
    </button>
  </section>

</main>

<footer class="footer">
  <p>© 2026 NutriWorld</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<script src="translations.js"></script>
<script src="foods.js"></script>
<script src="script.js"></script>

</body>
</html>
